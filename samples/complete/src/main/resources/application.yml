ssh:
  shell:
    authentication: security
    auth-provider-bean-name: sshAuthenticationManager
    authorized-public-keys: classpath:.ssh/authorized.keys
    commands:
      actuator:
        enabled: true
      jmx:
        enabled: true
      datasource:
        enabled: true
      stacktrace:
        enabled: true
      tasks:
        enabled: true
      system:
        enabled: true
      script:
        enabled: true
      manage-sessions:
        enabled: true
    host: 0.0.0.0
    port: 2222
    shared-history: false
    history-directory: ./target/ssh-history

spring:
  jmx:
    enabled: true
  first-datasource:
    url: jdbc:h2:mem:test-db-first
  second-datasource:
    url: jdbc:h2:mem:test-db-second
  main.lazy-initialization: true
  shell:
    interactive:
      enabled: false

server:
  port: 18080

management:
  endpoints:
    access:
      default: unrestricted
    jmx:
      exposure:
        include: "*"
    web:
      exposure:
        include: "*"
  endpoint:
    heapdump:
      access: unrestricted
    shutdown:
      access: unrestricted
  info:
    defaults:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    process:
      enabled: true

info:
  app:
    name: ssh-shell-spring-boot-complete-sample
    description: Complete sample
  build:
    groupId: ${project.groupId}
    artifactId: ${project.artifactId}
    version: ${project.version}
  dependencies:
    spring-boot: ${spring-boot.version}
    spring-shell: ${spring-shell.version}
    jackson: ${jackson.version}

logging:
  level:
    io.github.choseongah: debug
