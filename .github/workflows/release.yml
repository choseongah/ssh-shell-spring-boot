name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        type: choice
        description: 'Type of release'
        required: true
        options:
          - patch
          - minor
          - major
      version:
        description: 'Specified version to release'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:

    name: Release
    
    runs-on: ubuntu-latest

    env:
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

    steps:

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: gradle
      - name: Get project version
        id: version
        run: |
          version=$(sed -n 's/^version=//p' gradle.properties | head -n 1)
          version=${version%%-*}
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Print current version
        run: echo "Current version = ${{ steps.version.outputs.version }}"
      - name: 'Compute next versions'
        id: next
        uses: "WyriHaximus/github-action-next-semvers@v1"
        with:
          version: ${{ steps.version.outputs.version }}
      - name: Choose next version
        id: choose
        shell: bash
        run: |
          version='${{ github.event.inputs.version }}'
          if [[ -n "$version" ]]; then
            next="$version"
          elif [[ '${{ github.event.inputs.type }}' == 'major' ]]; then
            next='${{ steps.next.outputs.major }}'
          elif [[ '${{ github.event.inputs.type }}' == 'minor' ]]; then
            next='${{ steps.next.outputs.minor }}'
          else
            next='${{ steps.version.outputs.version }}'
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "purenext=${next%%-*}" >> "$GITHUB_OUTPUT"
      - name: 'Get next snapshot version'
        id: snapshot
        uses: "WyriHaximus/github-action-next-semvers@v1"
        with:
          version: ${{ steps.choose.outputs.purenext }}
      - name: Set release and snapshot versions
        id: versions
        run: |
          echo "snapshot=${{ steps.snapshot.outputs.patch }}-SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "release=${{ steps.choose.outputs.next }}" >> "$GITHUB_OUTPUT"
      - name: Log versions
        run: echo "Releasing version ${{ steps.versions.outputs.release }}, new dev version will be ${{ steps.versions.outputs.snapshot }}"
      - name: Configure git user
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
      - name: Update version to release
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("gradle.properties")
          release = "${{ steps.versions.outputs.release }}"
          lines = path.read_text(encoding="utf-8").splitlines()
          path.write_text(
              "\n".join(
                  f"version={release}" if line.startswith("version=") else line
                  for line in lines
              ) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit release version
        run: |
          git add gradle.properties
          git commit -m "Release ${{ steps.versions.outputs.release }}"
          git tag "v${{ steps.versions.outputs.release }}"
      - name: Publish release
        run: ./gradlew --no-daemon clean build publishToSonatype closeAndReleaseSonatypeStagingRepository
      - name: Update version to next snapshot
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("gradle.properties")
          snapshot = "${{ steps.versions.outputs.snapshot }}"
          lines = path.read_text(encoding="utf-8").splitlines()
          path.write_text(
              "\n".join(
                  f"version={snapshot}" if line.startswith("version=") else line
                  for line in lines
              ) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit next snapshot version
        run: |
          git add gradle.properties
          git commit -m "Back to snapshots"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          tags: true
